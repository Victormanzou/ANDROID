{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0"><i class="bi bi-cart4 text-primary"></i> Punto de Venta</h4>
                    <button class="btn btn-primary" onclick="toggleEscaner()">
                        <i class="bi bi-camera"></i> Activar Escáner
                    </button>
                </div>
                
                <div id="contenedor-lector" class="mb-3" style="display: none; border: 2px solid #0d6efd; border-radius: 10px; padding: 10px;">
                    <div id="reader" style="width: 100%;"></div>
                    <button class="btn btn-sm btn-danger w-100 mt-2" onclick="toggleEscaner()">Detener Cámara</button>
                </div>

                <div class="input-group input-group-lg mb-4">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-upc-scan text-muted"></i></span>
                    <input type="text" id="buscadorVentas" class="form-control border-start-0" placeholder="Escanea o busca producto..." autofocus>
                </div>

                <div class="table-responsive" style="min-height: 400px;">
                    <table class="table align-middle" id="tablaVentas">
                        <thead class="table-light">
                            <tr>
                                <th>Producto</th>
                                <th class="text-center">Cant.</th>
                                <th>Precio</th>
                                <th>Subtotal</th>
                                <th class="text-end"></th>
                            </tr>
                        </thead>
                        <tbody id="listaVenta">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm border-0 bg-primary text-white mb-3">
            <div class="card-body text-center py-4">
                <h6 class="text-uppercase opacity-75">Total a Pagar</h6>
                <h1 class="display-4 fw-bold mb-0" id="totalPagar">$0.00</h1>
            </div>
        </div>

        <div class="card shadow-sm border-0 p-3">
            <button class="btn btn-success btn-lg w-100 py-3 mb-2 fw-bold shadow-sm" onclick="finalizarVenta()">
                <i class="bi bi-cash-stack"></i> COBRAR
            </button>
            
            <div class="row g-2">
                <div class="col-6">
                    <button class="btn btn-outline-dark w-100 py-2" onclick="window.print()">
                        <i class="bi bi-printer"></i> Ticket
                    </button>
                </div>
                <div class="col-6">
                    <button class="btn btn-outline-danger w-100 py-2" onclick="cancelarVenta()">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </button>
                </div>
            </div>
            
            <hr class="my-4">
            
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Artículos:</span>
                <span class="fw-bold" id="conteoArticulos">0</span>
            </div>
            <div class="d-flex justify-content-between">
                <span class="text-muted">Fecha:</span>
                <span class="small">{{ now.strftime('%d/%m/%Y') if now else "13/04/2026" }}</span>
            </div>
        </div>

        <div class="alert alert-secondary border-0 mt-3 text-center">
            <small class="d-block text-muted">Cambio entregado:</small>
            <h4 class="mb-0 fw-bold" id="cambioEntregado">$0.00</h4>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let carrito = [];
let html5QrcodeScanner = null;

function toggleEscaner() {
    const contenedor = document.getElementById('contenedor-lector');
    if (contenedor.style.display === 'none') {
        contenedor.style.display = 'block';
        iniciarEscaner();
    } else {
        contenedor.style.display = 'none';
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear().catch(error => console.error("Error al limpiar:", error));
            html5QrcodeScanner = null;
        }
    }
}

function iniciarEscaner() {
    if (!html5QrcodeScanner) {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: {width: 250, height: 150},
            aspectRatio: 1.0
        });
    }
    
    html5QrcodeScanner.render((decodedText) => {
        console.log("Escaneado con éxito:", decodedText);
        buscarYAgregar(decodedText);
        
        // Efecto visual de éxito
        const readerDiv = document.getElementById('reader');
        readerDiv.style.border = "5px solid green";
        setTimeout(() => readerDiv.style.border = "none", 500);
    }, (error) => {
        // Errores de escaneo ignorados (buscando...)
    });
}

function buscarYAgregar(codigo) {
    if (!codigo) return;
    fetch(`/buscar_producto/${codigo}`)
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                agregarAlCarrito(data.producto);
                if (navigator.vibrate) navigator.vibrate(100);
            } else {
                console.warn("Producto no registrado.");
            }
        })
        .catch(err => console.error('Error de red:', err));
}

// El resto de tus funciones (agregarAlCarrito, actualizarTabla, etc.) se mantienen igual
// ... [Mantenemos el resto de tu lógica original de carrito y pagos] ...

document.getElementById('buscadorVentas').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        const codigo = this.value.trim();
        buscarYAgregar(codigo);
        this.value = '';
    }
});

function agregarAlCarrito(producto) {
    const itemExistente = carrito.find(p => p.codigo_barras === producto.codigo_barras);
    if (itemExistente) {
        itemExistente.cantidad++;
    } else {
        carrito.push({
            codigo_barras: producto.codigo_barras,
            nombre: producto.nombre,
            precio: producto.precio_venta,
            cantidad: 1
        });
    }
    actualizarTabla();
}

function actualizarTabla() {
    const listaVenta = document.getElementById('listaVenta');
    listaVenta.innerHTML = '';
    let total = 0;
    let items = 0;

    carrito.forEach((p, index) => {
        const subtotal = p.precio * p.cantidad;
        total += subtotal;
        items += p.cantidad;
        listaVenta.innerHTML += `
            <tr>
                <td>
                    <span class="fw-bold d-block">${p.nombre}</span>
                    <small class="text-muted">${p.codigo_barras}</small>
                </td>
                <td class="text-center" style="width: 120px;">
                    <div class="input-group input-group-sm">
                        <button class="btn btn-outline-secondary" onclick="cambiarCant(${index}, -1)">-</button>
                        <input type="text" class="form-control text-center" value="${p.cantidad}" readonly>
                        <button class="btn btn-outline-secondary" onclick="cambiarCant(${index}, 1)">+</button>
                    </div>
                </td>
                <td>$${p.precio.toFixed(2)}</td>
                <td class="fw-bold">$${subtotal.toFixed(2)}</td>
                <td class="text-end">
                    <button class="btn btn-link text-danger px-0" onclick="eliminarItem(${index})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>`;
    });

    document.getElementById('totalPagar').innerText = `$${total.toFixed(2)}`;
    document.getElementById('conteoArticulos').innerText = items;
}

function cambiarCant(index, valor) {
    carrito[index].cantidad += valor;
    if (carrito[index].cantidad <= 0) eliminarItem(index);
    actualizarTabla();
}

function eliminarItem(index) {
    carrito.splice(index, 1);
    actualizarTabla();
}

function finalizarVenta() {
    if (carrito.length === 0) return alert("⚠️ El carrito está vacío");
    const pago = prompt("Cantidad con la que paga el cliente:");
    if (pago === null) return;
    const total = parseFloat(document.getElementById('totalPagar').innerText.replace('$', ''));
    const pagoNum = parseFloat(pago);
    if (isNaN(pagoNum) || pagoNum < total) return alert("❌ Pago insuficiente");

    fetch('/finalizar_venta', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ carrito: carrito })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const cambio = pagoNum - total;
            document.getElementById('cambioEntregado').innerText = `$${cambio.toFixed(2)}`;
            alert(`✅ Venta Exitosa. Cambio: $${cambio.toFixed(2)}`);
            carrito = [];
            actualizarTabla();
        }
    });
}

function cancelarVenta() {
    if (confirm("¿Cancelar venta?")) {
        carrito = [];
        actualizarTabla();
        document.getElementById('cambioEntregado').innerText = "$0.00";
    }
}
</script>
{% endblock %}
