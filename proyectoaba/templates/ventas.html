{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h3>Punto de Venta</h3>

    <!-- 🔥 BOTÓN CÁMARA -->
    <button class="btn btn-primary mb-3" onclick="Android.iniciarEscaner()">
        Escanear producto
    </button>

    <input type="text" id="buscadorVentas" class="form-control mb-3" placeholder="Código...">

    <table class="table">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cant</th>
                <th>Precio</th>
                <th>Subtotal</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="listaVenta"></tbody>
    </table>

    <h3>Total: $<span id="totalPagar">0.00</span></h3>

    <button class="btn btn-success" onclick="finalizarVenta()">COBRAR</button>
    <button class="btn btn-danger" onclick="cancelarVenta()">CANCELAR</button>

    <h4>Cambio: <span id="cambioEntregado">$0.00</span></h4>
</div>

<script>
let carrito = [];

// 🔥 BUSCAR PRODUCTO
function buscarYAgregar(codigo) {
    fetch(`https://android-production-3e1e.up.railway.app/buscar_producto/${codigo}`)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                agregarAlCarrito(data.producto);
            } else {
                alert("Producto no encontrado");
            }
        })
        .catch(err => console.error(err));
}

// 🔥 AGREGAR
function agregarAlCarrito(producto) {
    const existente = carrito.find(p => p.codigo_barras === producto.codigo_barras);

    if (existente) {
        existente.cantidad++;
    } else {
        carrito.push({
            codigo_barras: producto.codigo_barras,
            nombre: producto.nombre,
            precio: producto.precio_venta,
            cantidad: 1
        });
    }

    actualizarTabla();
}

// 🔥 ACTUALIZAR UI
function actualizarTabla() {
    const lista = document.getElementById('listaVenta');
    lista.innerHTML = '';

    let total = 0;

    carrito.forEach((p, i) => {
        let subtotal = p.precio * p.cantidad;
        total += subtotal;

        lista.innerHTML += `
        <tr>
            <td>${p.nombre}</td>
            <td>${p.cantidad}</td>
            <td>${p.precio}</td>
            <td>${subtotal.toFixed(2)}</td>
            <td><button onclick="eliminarItem(${i})">X</button></td>
        </tr>`;
    });

    document.getElementById('totalPagar').innerText = total.toFixed(2);
}

// 🔥 ELIMINAR
function eliminarItem(i) {
    carrito.splice(i, 1);
    actualizarTabla();
}

// 🔥 COBRAR
function finalizarVenta() {
    if (carrito.length === 0) return alert("Carrito vacío");

    let pago = prompt("Pago:");
    if (!pago) return;

    let total = parseFloat(document.getElementById('totalPagar').innerText);
    let pagoNum = parseFloat(pago);

    if (pagoNum < total) return alert("Pago insuficiente");

    fetch('https://android-production-3e1e.up.railway.app/finalizar_venta', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ carrito })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            let cambio = pagoNum - total;

            document.getElementById('cambioEntregado').innerText = `$${cambio.toFixed(2)}`;

            alert("Venta realizada");

            carrito = [];
            actualizarTabla();

            setTimeout(() => location.reload(), 1000);
        }
    })
    .catch(err => console.error(err));
}

// 🔥 CANCELAR
function cancelarVenta() {
    if (!confirm("Cancelar venta?")) return;

    carrito = [];
    actualizarTabla();

    document.getElementById('cambioEntregado').innerText = "$0.00";
}

// 🔥 INPUT MANUAL
document.getElementById('buscadorVentas').addEventListener('keypress', e => {
    if (e.key === 'Enter') {
        buscarYAgregar(e.target.value);
        e.target.value = '';
    }
});
</script>

{% endblock %}
