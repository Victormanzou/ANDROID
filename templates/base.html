<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Abarrotes Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
                <i class="bi bi-shop me-2"></i>Abarrotes Pro
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('ventas') }}">Ventas</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('inventario') }}">Inventario</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('compras') }}">Compras</a>
                    </li>

                    <!-- MODO OSCURO -->
                    <li class="nav-item d-flex align-items-center ms-3">
                        <i class="bi bi-moon-stars-fill text-white me-2"></i>
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="darkModeToggle">
                        </div>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const toggle = document.getElementById('darkModeToggle');

        toggle.addEventListener('change', () => {
            document.body.classList.toggle('dark-mode');
            const mode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', mode);
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            toggle.checked = true;
        }

        const style = document.createElement('style');
        style.innerHTML = `

        /* =========================
           MODO OSCURO BASE
        ========================= */

        .dark-mode {
            background: radial-gradient(circle at top right, #0f172a, #1e293b) !important;
            color: #f1f5f9 !important;
        }

        .dark-mode .navbar {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .dark-mode .card {
            background: rgba(30, 41, 59, 0.85) !important;
            color: #f1f5f9 !important;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dark-mode .text-muted {
            color: #94a3b8 !important;
        }

        /* TABLAS */
        .dark-mode table {
            color: #f1f5f9 !important;
        }

        .dark-mode td,
        .dark-mode th {
            color: #f1f5f9 !important;
            border-color: #334155 !important;
        }

        /* INPUTS */
        .dark-mode input,
        .dark-mode textarea,
        .dark-mode select {
            background: #0f172a !important;
            color: #f1f5f9 !important;
            border: 1px solid #334155 !important;
        }

        .dark-mode input::placeholder {
            color: #94a3b8 !important;
        }

        /* BOTONES */
        .dark-mode .btn-light {
            background: #334155 !important;
            color: #f1f5f9 !important;
            border: 1px solid #475569 !important;
        }

        .dark-mode .btn-outline-secondary {
            color: #f1f5f9 !important;
            border-color: #64748b !important;
        }

        /* DROPDOWNS */
        .dark-mode .dropdown-menu {
            background: #1e293b !important;
            border: 1px solid #334155;
        }

        .dark-mode .dropdown-item {
            color: #f1f5f9 !important;
        }

        .dark-mode .dropdown-item:hover {
            background: #334155 !important;
        }

        /* ALERTAS */
        .dark-mode .alert {
            background: #1e293b !important;
            color: #f1f5f9 !important;
            border: 1px solid #334155 !important;
        }

        /* TRANSICIÓN SUAVE */
        body, .card, table, input {
            transition: all 0.25s ease;
        }

        `;
        document.head.appendChild(style);
    </script>

</body>
</html>
