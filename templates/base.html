<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Abarrotes Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
                <i class="bi bi-shop me-2"></i>Abarrotes Pro
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('ventas') }}"><i class="bi bi-cart-check"></i> Ventas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('inventario') }}"><i class="bi bi-box-seam"></i> Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('compras') }}"><i class="bi bi-truck"></i> Compras</a>
                    </li>

                    <li class="nav-item dropdown ms-lg-3 me-3">
                        <a class="nav-link position-relative btn-noti p-0" href="#" id="notiDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-bell fs-5 text-white"></i>
                            <span class="badge-pulse"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3 p-0" aria-labelledby="notiDropdown" style="width: 280px; border-radius: 15px; overflow: hidden;">
                            <li class="px-3 py-2 bg-light border-bottom">
                                <span class="fw-bold small text-uppercase">Avisos Recientes</span>
                            </li>
                            <li>
                                <a class="dropdown-item py-3 border-bottom" href="{{ url_for('inventario') }}">
                                    <div class="d-flex align-items-center">
                                        <div class="bg-soft-danger text-danger p-2 rounded-circle me-3">
                                            <i class="bi bi-exclamation-triangle"></i>
                                        </div>
                                        <div>
                                            <small class="d-block fw-bold">Stock Crítico</small>
                                            <small class="text-muted">Pan de Caja (2 unidades)</small>
                                        </div>
                                    </div>
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item py-3 border-bottom" href="#" data-bs-toggle="modal" data-bs-target="#modalCaducidad">
                                    <div class="d-flex align-items-center">
                                        <div class="bg-soft-warning text-warning p-2 rounded-circle me-3">
                                            <i class="bi bi-clock-history"></i>
                                        </div>
                                        <div>
                                            <small class="d-block fw-bold">Vencimientos</small>
                                            <small class="text-muted">3 productos por vencer</small>
                                        </div>
                                    </div>
                                </a>
                            </li>
                            <li class="text-center py-2">
                                <a href="#" class="small text-primary text-decoration-none">Ver todo el historial</a>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item d-flex align-items-center">
                        <i class="bi bi-moon-stars-fill text-white me-2"></i>
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="darkModeToggle">
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const toggle = document.getElementById('darkModeToggle');
        
        // Función para cambiar modo
        toggle.addEventListener('change', () => {
            document.body.classList.toggle('dark-mode');
            const mode = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            localStorage.setItem('theme', mode);
        });

        // Cargar preferencia guardada
        if (localStorage.getItem('theme') === 'dark') {
            toggle.checked = true;
            document.body.classList.add('dark-mode');
        }

        // Estilos Inyectados para el Modo Oscuro
        const style = document.createElement('style');
        style.innerHTML = `
            .dark-mode { background: radial-gradient(circle at top right, #0f172a, #1e293b) !important; color: #f1f5f9 !important; }
            .dark-mode .card { background: rgba(30, 41, 59, 0.7) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1); }
            .dark-mode .text-muted { color: #94a3b8 !important; }
            .dark-mode .table { color: white !important; }
            .dark-mode .table-light { background: #334155 !important; color: white !important; border: none; }
            .dark-mode .navbar { border-bottom: 1px solid rgba(255,255,255,0.1); }
            .dark-mode .dropdown-menu { background: #1e293b !important; border: 1px solid #334155; }
            .dark-mode .dropdown-item { color: #f1f5f9 !important; }
            .dark-mode .dropdown-item:hover { background: #334155 !important; }
            .dark-mode .bg-light { background: #0f172a !important; color: #f1f5f9; }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
