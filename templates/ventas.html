{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">
                        <i class="bi bi-cart4 text-primary"></i> Punto de Venta
                    </h4>

                    <button class="btn btn-primary" onclick="abrirEscaner()">
                        <i class="bi bi-camera"></i> Escanear
                    </button>
                </div>

                <!-- INPUT -->
                <div class="input-group input-group-lg mb-4">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-upc-scan text-muted"></i>
                    </span>
                    <input type="text" id="buscadorVentas" class="form-control border-start-0" placeholder="Escanea o busca producto..." autofocus>
                </div>

                <!-- TABLA -->
                <div class="table-responsive" style="min-height: 400px;">
                    <table class="table align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Producto</th>
                                <th class="text-center">Cant.</th>
                                <th>Precio</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="listaVenta"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="col-md-4">

        <div class="card shadow-sm border-0 bg-primary text-white mb-3">
            <div class="card-body text-center py-4">
                <h6 class="text-uppercase opacity-75">Total a Pagar</h6>
                <h1 class="display-4 fw-bold mb-0" id="totalPagar">$0.00</h1>
            </div>
        </div>

        <div class="card shadow-sm border-0 p-3">

            <!-- INPUT PAGO -->
            <input type="number" id="inputPago" class="form-control mb-3" placeholder="Pago del cliente">

            <button class="btn btn-success btn-lg w-100 mb-2 fw-bold" onclick="finalizarVenta()">
                <i class="bi bi-cash-stack"></i> COBRAR
            </button>

            <button class="btn btn-outline-danger w-100 mb-2" onclick="cancelarVenta()">
                <i class="bi bi-x-circle"></i> Cancelar
            </button>

            <hr>

            <div class="d-flex justify-content-between mb-2">
                <span>Artículos:</span>
                <span id="conteoArticulos">0</span>
            </div>

            <div class="d-flex justify-content-between">
                <span>Fecha:</span>
                <span>{{ now.strftime('%d/%m/%Y') }}</span>
            </div>
        </div>

        <div class="alert alert-secondary text-center mt-3">
            <small>Cambio:</small>
            <h4 id="cambioEntregado">$0.00</h4>
        </div>

        <!-- MENSAJES -->
        <div id="mensaje" class="alert mt-3" style="display:none;"></div>

    </div>
</div>

<script>
let carrito = [];

// 📷 ESCÁNER
function abrirEscaner() {
    if (window.Android && Android.iniciarEscaner) {
        Android.iniciarEscaner();
    } else {
        mostrarMensaje("⚠️ Cámara solo en app", "warning");
    }
}

// 🔍 BUSCAR
function buscarYAgregar(codigo) {
    fetch(`/buscar_producto/${codigo}`)
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            agregarAlCarrito(data.producto);
        } else {
            mostrarMensaje("Producto no encontrado", "danger");
        }
    })
    .catch(() => mostrarMensaje("Error conexión", "danger"));
}

// ➕ AGREGAR
function agregarAlCarrito(producto) {
    const existente = carrito.find(p => p.codigo_barras === producto.codigo_barras);

    if (existente) {
        existente.cantidad++;
    } else {
        carrito.push({
            codigo_barras: producto.codigo_barras,
            nombre: producto.nombre,
            precio: producto.precio_venta,
            cantidad: 1
        });
    }

    actualizarTabla();
}

// 🔄 ACTUALIZAR
function actualizarTabla() {
    const lista = document.getElementById('listaVenta');
    lista.innerHTML = '';

    let total = 0;
    let items = 0;

    carrito.forEach((p, i) => {
        let subtotal = p.precio * p.cantidad;
        total += subtotal;
        items += p.cantidad;

        lista.innerHTML += `
        <tr>
            <td>${p.nombre}</td>
            <td class="text-center">${p.cantidad}</td>
            <td>$${p.precio}</td>
            <td>$${subtotal.toFixed(2)}</td>
            <td>
                <button class="btn btn-sm btn-danger" onclick="eliminarItem(${i})">X</button>
            </td>
        </tr>`;
    });

    document.getElementById('totalPagar').innerText = `$${total.toFixed(2)}`;
    document.getElementById('conteoArticulos').innerText = items;
}

// ❌ ELIMINAR
function eliminarItem(i) {
    carrito.splice(i, 1);
    actualizarTabla();
}

// 💰 COBRAR
function finalizarVenta() {
    if (carrito.length === 0) {
        mostrarMensaje("Carrito vacío", "warning");
        return;
    }

    let pago = parseFloat(document.getElementById('inputPago').value);
    let total = parseFloat(document.getElementById('totalPagar').innerText.replace('$',''));

    if (isNaN(pago) || pago < total) {
        mostrarMensaje("Pago insuficiente", "danger");
        return;
    }

    fetch('/finalizar_venta', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ carrito })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            let cambio = pago - total;

            document.getElementById('cambioEntregado').innerText = `$${cambio.toFixed(2)}`;

            mostrarMensaje("✅ Venta realizada", "success");

            carrito = [];
            actualizarTabla();
            document.getElementById('inputPago').value = '';
        }
    });
}

// ❌ CANCELAR
function cancelarVenta() {
    carrito = [];
    actualizarTabla();
    document.getElementById('cambioEntregado').innerText = "$0.00";
    document.getElementById('inputPago').value = '';
    mostrarMensaje("Venta cancelada", "secondary");
}

// 📢 MENSAJES
function mostrarMensaje(texto, tipo) {
    const div = document.getElementById('mensaje');
    div.innerHTML = texto;
    div.className = `alert alert-${tipo}`;
    div.style.display = 'block';

    setTimeout(() => div.style.display = 'none', 2500);
}

// ⌨️ ENTER
document.getElementById('buscadorVentas').addEventListener('keypress', e => {
    if (e.key === 'Enter') {
        buscarYAgregar(e.target.value.trim());
        e.target.value = '';
    }
});
</script>

{% endblock %}
