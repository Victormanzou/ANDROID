{% extends 'base.html' %}

{% block content %}
<div class="container">

    <h3 class="mb-3">🛒 Punto de Venta</h3>

    <!-- 📷 BOTÓN ESCANEAR -->
    <button class="btn btn-success mb-3 w-100" onclick="abrirEscaner()">
        📷 Escanear producto
    </button>

    <!-- 🔍 INPUT -->
    <input type="text" id="buscadorVentas" class="form-control mb-3" placeholder="Escanea o escribe código..." autofocus>

    <!-- 🛒 TABLA -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cant</th>
                <th>Precio</th>
                <th>Subtotal</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="listaVenta"></tbody>
    </table>

    <!-- 💰 TOTAL -->
    <h3>Total: $<span id="totalPagar">0.00</span></h3>

    <!-- 💵 INPUT PAGO -->
    <input type="number" id="inputPago" class="form-control mb-2" placeholder="Pago del cliente">

    <!-- 🔘 BOTONES -->
    <button class="btn btn-success w-100 mb-2" onclick="finalizarVenta()">COBRAR</button>
    <button class="btn btn-danger w-100 mb-2" onclick="cancelarVenta()">CANCELAR</button>

    <!-- 💸 CAMBIO -->
    <h4>Cambio: <span id="cambioEntregado">$0.00</span></h4>

    <!-- 📢 MENSAJES -->
    <div id="mensaje" class="alert mt-3" style="display:none;"></div>

</div>

<script>
let carrito = [];

// 📷 ESCÁNER (ANDROID)
function abrirEscaner() {
    if (window.Android && Android.iniciarEscaner) {
        Android.iniciarEscaner();
    } else {
        mostrarMensaje("⚠️ Cámara solo en app", "warning");
    }
}

// 🔍 BUSCAR
function buscarYAgregar(codigo) {
    if (!codigo) return;

    fetch(`/buscar_producto/${codigo}`)
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            agregarAlCarrito(data.producto);
        } else {
            mostrarMensaje("❌ Producto no encontrado", "danger");
        }
    })
    .catch(() => mostrarMensaje("❌ Error conexión", "danger"));
}

// ➕ AGREGAR
function agregarAlCarrito(producto) {
    const existente = carrito.find(p => p.codigo_barras === producto.codigo_barras);

    if (existente) {
        existente.cantidad++;
    } else {
        carrito.push({
            codigo_barras: producto.codigo_barras,
            nombre: producto.nombre,
            precio: producto.precio_venta,
            cantidad: 1
        });
    }

    actualizarTabla();
}

// 🔄 ACTUALIZAR UI
function actualizarTabla() {
    const lista = document.getElementById('listaVenta');
    lista.innerHTML = '';

    let total = 0;

    carrito.forEach((p, i) => {
        let subtotal = p.precio * p.cantidad;
        total += subtotal;

        lista.innerHTML += `
        <tr>
            <td>${p.nombre}</td>
            <td>${p.cantidad}</td>
            <td>$${p.precio}</td>
            <td>$${subtotal.toFixed(2)}</td>
            <td><button class="btn btn-sm btn-danger" onclick="eliminarItem(${i})">X</button></td>
        </tr>`;
    });

    document.getElementById('totalPagar').innerText = total.toFixed(2);
}

// ❌ ELIMINAR
function eliminarItem(i) {
    carrito.splice(i, 1);
    actualizarTabla();
}

// 💰 COBRAR
function finalizarVenta() {
    if (carrito.length === 0) {
        mostrarMensaje("⚠️ Carrito vacío", "warning");
        return;
    }

    let pago = parseFloat(document.getElementById('inputPago').value);
    let total = parseFloat(document.getElementById('totalPagar').innerText);

    if (isNaN(pago) || pago < total) {
        mostrarMensaje("❌ Pago insuficiente", "danger");
        return;
    }

    fetch('/finalizar_venta', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ carrito })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            let cambio = pago - total;

            document.getElementById('cambioEntregado').innerText = `$${cambio.toFixed(2)}`;

            mostrarTicket(cambio);

            carrito = [];
            actualizarTabla();
            document.getElementById('inputPago').value = '';
        } else {
            mostrarMensaje("❌ Error en venta", "danger");
        }
    })
    .catch(() => mostrarMensaje("❌ Error conexión", "danger"));
}

// ❌ CANCELAR
function cancelarVenta() {
    carrito = [];
    actualizarTabla();

    document.getElementById('cambioEntregado').innerText = "$0.00";
    document.getElementById('inputPago').value = '';

    mostrarMensaje("Venta cancelada", "secondary");
}

// 🧾 TICKET
function mostrarTicket(cambio) {
    let total = document.getElementById('totalPagar').innerText;

    let html = `
        🧾 Venta realizada<br>
        Total: $${total}<br>
        Cambio: $${cambio.toFixed(2)}
    `;

    mostrarMensaje(html, "success");
}

// 📢 MENSAJES VISUALES
function mostrarMensaje(texto, tipo) {
    const div = document.getElementById('mensaje');
    div.innerHTML = texto;
    div.className = `alert alert-${tipo}`;
    div.style.display = 'block';

    setTimeout(() => div.style.display = 'none', 3000);
}

// ⌨️ ENTER
document.getElementById('buscadorVentas').addEventListener('keypress', e => {
    if (e.key === 'Enter') {
        buscarYAgregar(e.target.value.trim());
        e.target.value = '';
    }
});
</script>

{% endblock %}
