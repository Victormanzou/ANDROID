<script>
let carrito = [];
let scanner = null;
let bloqueado = false;

/* =========================
   📷 CÁMARA
========================= */
function toggleEscaner() {
    const c = document.getElementById('contenedor-lector');

    if (c.style.display === 'none') {
        c.style.display = 'block';
        iniciarEscaner();
    } else {
        c.style.display = 'none';
        if (scanner) {
            scanner.clear().catch(()=>{});
            scanner = null;
        }
    }
}

function iniciarEscaner() {

    Html5Qrcode.getCameras().then(devices => {

        let cameraId = devices.find(d =>
            d.label.toLowerCase().includes("back") ||
            d.label.toLowerCase().includes("trasera")
        )?.id || devices[0].id;

        scanner = new Html5Qrcode("reader");

        scanner.start(
            cameraId,
            { fps: 10, qrbox: 200 },
            (text) => {

                if (bloqueado) return;
                bloqueado = true;

                buscarYAgregar(text);
                vibrar();

                setTimeout(()=> bloqueado = false, 1000);
            }
        );
    });
}

/* =========================
   🔍 BUSCAR
========================= */
function buscarYAgregar(codigo){
    if(!codigo) return;

    fetch(`/buscar_producto/${codigo}`)
    .then(r=>r.json())
    .then(data=>{
        if(data.success) agregar(data.producto);
    });
}

/* =========================
   ➕ AGREGAR
========================= */
function agregar(p){

    let ex = carrito.find(x=>x.codigo_barras === p.codigo_barras);

    if(ex) ex.cantidad++;
    else carrito.push({
        codigo_barras:p.codigo_barras,
        nombre:p.nombre,
        precio:p.precio_venta,
        cantidad:1
    });

    render();
}

/* =========================
   RENDER
========================= */
function render(){

    let lista = document.getElementById('listaVenta');
    lista.innerHTML = '';

    let total = 0;
    let items = 0;

    carrito.forEach((p,i)=>{

        let sub = p.precio * p.cantidad;
        total += sub;
        items += p.cantidad;

        lista.innerHTML += `
        <tr>
            <td>${p.nombre}</td>

            <td>
                <button onclick="menos(${i})">-</button>
                ${p.cantidad}
                <button onclick="mas(${i})">+</button>
            </td>

            <td>$${p.precio}</td>
            <td>$${sub.toFixed(2)}</td>
            <td><button onclick="del(${i})">X</button></td>
        </tr>`;
    });

    document.getElementById('totalPagar').innerText = `$${total.toFixed(2)}`;
    document.getElementById('conteoArticulos').innerText = items;
}

/* =========================
   CANTIDADES
========================= */
function mas(i){
    carrito[i].cantidad++;
    render();
}

function menos(i){
    carrito[i].cantidad--;
    if(carrito[i].cantidad <= 0) carrito.splice(i,1);
    render();
}

function del(i){
    carrito.splice(i,1);
    render();
}

/* =========================
   💰 COBRAR
========================= */
function finalizarVenta(){

    if(carrito.length === 0) return;

    let pago = parseFloat(document.getElementById('inputPago').value);
    let total = parseFloat(document.getElementById('totalPagar').innerText.replace('$',''));

    if(isNaN(pago) || pago < total) return;

    fetch('/finalizar_venta',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({carrito})
    })
    .then(r=>r.json())
    .then(()=>{

        document.getElementById('cambioEntregado').innerText =
            `$${(pago-total).toFixed(2)}`;

        carrito = [];
        render();
        document.getElementById('inputPago').value = '';
    });
}

/* =========================
   ❌ CANCELAR
========================= */
function cancelarVenta(){
    carrito = [];
    render();
    document.getElementById('inputPago').value = '';
    document.getElementById('cambioEntregado').innerText = "$0.00";
}

/* =========================
   ⌨️ ENTER FIX ANDROID (IMPORTANTE)
========================= */
window.onload = function () {

    const input = document.getElementById('buscadorVentas');

    input.focus(); // 🔥 siempre listo como POS

    input.addEventListener('keydown', function (e) {

        if (e.key === 'Enter') {
            e.preventDefault();   // 🔥 bloquea “siguiente”
            e.stopPropagation();

            let codigo = input.value.trim();
            if (!codigo) return;

            buscarYAgregar(codigo);
            input.value = '';

            input.focus(); // 🔥 vuelve al input automático
        }
    });
};

/* =========================
   🔊 VIBRACIÓN
========================= */
function vibrar(){
    if(navigator.vibrate) navigator.vibrate(80);
}
</script>
