{% extends 'base.html' %}

{% block content %}

<div class="row">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">
                        <i class="bi bi-cart4 text-primary"></i> Punto de Venta
                    </h4>

                    <button class="btn btn-primary" onclick="toggleEscaner()">
                        <i class="bi bi-camera"></i> Escanear
                    </button>
                </div>

                <!-- CÁMARA -->
                <div id="contenedor-lector"
                     style="display:none; border:2px solid #0d6efd; padding:10px; border-radius:10px;">
                    <div id="reader"></div>
                    <button class="btn btn-sm btn-danger w-100 mt-2" onclick="toggleEscaner()">
                        Detener Cámara
                    </button>
                </div>

                <!-- INPUT -->
                <input type="text"
                       id="buscadorVentas"
                       class="form-control mb-3"
                       placeholder="Escanea o escribe código"
                       autocomplete="off"
                       enterkeyhint="search"
                       inputmode="text">

                <!-- TABLA -->
                <table class="table">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Cant</th>
                            <th>Precio</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="listaVenta"></tbody>
                </table>

            </div>
        </div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="col-md-4">

        <div class="card bg-primary text-white text-center p-3 mb-3">
            <h5>Total</h5>
            <h1 id="totalPagar">$0.00</h1>
        </div>

        <input type="number"
               id="inputPago"
               class="form-control mb-2"
               placeholder="Pago del cliente">

        <button class="btn btn-success w-100 mb-2" onclick="finalizarVenta()">
            COBRAR
        </button>

        <button class="btn btn-danger w-100" onclick="cancelarVenta()">
            CANCELAR
        </button>

        <hr>

        <div class="d-flex justify-content-between">
            <span>Artículos:</span>
            <span id="conteoArticulos">0</span>
        </div>

        <div class="alert alert-secondary text-center mt-3">
            Cambio:
            <h4 id="cambioEntregado">$0.00</h4>
        </div>

    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let carrito = [];
let scanner = null;
let bloqueado = false;

/* ======================
   📷 CÁMARA
====================== */
function toggleEscaner() {
    const c = document.getElementById('contenedor-lector');

    if (c.style.display === 'none') {
        c.style.display = 'block';
        iniciarEscaner();
    } else {
        c.style.display = 'none';
        if (scanner) {
            scanner.clear().catch(()=>{});
            scanner = null;
        }
    }
}

function iniciarEscaner() {
    if (!scanner) {
        scanner = new Html5QrcodeScanner("reader", {
            fps: 10,
            qrbox: 200,
            facingMode: "environment"
        });
    }

    scanner.render((text) => {

        if (bloqueado) return;
        bloqueado = true;

        buscarYAgregar(text);

        setTimeout(() => bloqueado = false, 1500);
    });
}

/* ======================
   🔍 BUSCAR
====================== */
function buscarYAgregar(codigo) {
    if (!codigo) return;

    fetch(`/buscar_producto/${codigo}`)
        .then(r => r.json())
        .then(data => {
            if (data.success) agregar(data.producto);
        });
}

/* ======================
   ➕ CARRITO
====================== */
function agregar(p) {
    let ex = carrito.find(x => x.codigo_barras === p.codigo_barras);

    if (ex) ex.cantidad++;
    else carrito.push({
        codigo_barras: p.codigo_barras,
        nombre: p.nombre,
        precio: p.precio_venta,
        cantidad: 1
    });

    render();
}

/* ======================
   🔄 RENDER
====================== */
function render() {
    let total = 0;
    let items = 0;
    let lista = document.getElementById('listaVenta');

    lista.innerHTML = '';

    carrito.forEach((p, i) => {
        let sub = p.precio * p.cantidad;
        total += sub;
        items += p.cantidad;

        lista.innerHTML += `
        <tr>
            <td>${p.nombre}</td>
            <td>${p.cantidad}</td>
            <td>$${p.precio}</td>
            <td>$${sub.toFixed(2)}</td>
            <td><button onclick="del(${i})">X</button></td>
        </tr>`;
    });

    document.getElementById('totalPagar').innerText = `$${total.toFixed(2)}`;
    document.getElementById('conteoArticulos').innerText = items;
}

/* ======================
   ❌ ELIMINAR
====================== */
function del(i) {
    carrito.splice(i,1);
    render();
}

/* ======================
   💰 COBRAR
====================== */
function finalizarVenta() {
    if (carrito.length === 0) return;

    let pago = parseFloat(document.getElementById('inputPago').value);
    let total = parseFloat(document.getElementById('totalPagar').innerText.replace('$',''));

    if (isNaN(pago) || pago < total) return;

    fetch('/finalizar_venta', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ carrito })
    })
    .then(r=>r.json())
    .then(()=>{

        document.getElementById('cambioEntregado').innerText =
            `$${(pago-total).toFixed(2)}`;

        carrito = [];
        render();
        document.getElementById('inputPago').value = '';
    });
}

/* ======================
   ❌ CANCELAR
====================== */
function cancelarVenta() {
    carrito = [];
    render();
    document.getElementById('inputPago').value = '';
    document.getElementById('cambioEntregado').innerText = "$0.00";
}

/* ======================
   ⌨️ ENTER FIX ANDROID
====================== */
window.onload = function () {

    const input = document.getElementById('buscadorVentas');

    function procesar() {
        const codigo = input.value.trim();
        if (!codigo) return;

        buscarYAgregar(codigo);
        input.value = '';
    }

    input.addEventListener('keydown', function(e){
        if (e.key === 'Enter') {
            e.preventDefault();
            procesar();
        }
    });

    input.addEventListener('keyup', function(e){
        if (e.key === 'Enter') procesar();
    });
};

</script>

{% endblock %}
