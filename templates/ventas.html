{% extends 'base.html' %}

{% block content %}

<div class="row">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">
                        <i class="bi bi-cart4 text-primary"></i> Punto de Venta
                    </h4>

                    <button class="btn btn-primary" onclick="toggleEscaner()">
                        <i class="bi bi-camera"></i> Activar Escáner
                    </button>
                </div>

                <!-- CÁMARA -->
                <div id="contenedor-lector" class="mb-3"
                     style="display:none; border:2px solid #0d6efd; border-radius:10px; padding:10px;">
                    <div id="reader" style="width:100%;"></div>
                    <button class="btn btn-sm btn-danger w-100 mt-2" onclick="toggleEscaner()">
                        Detener Cámara
                    </button>
                </div>

                <!-- INPUT -->
                <div class="input-group input-group-lg mb-4">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-upc-scan text-muted"></i>
                    </span>

                    <input type="text"
                           id="buscadorVentas"
                           class="form-control border-start-0"
                           placeholder="Escanea o busca producto..."
                           inputmode="text"
                           autocomplete="off"
                           autofocus>
                </div>

                <!-- TABLA -->
                <div class="table-responsive" style="min-height: 400px;">
                    <table class="table align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Producto</th>
                            <th class="text-center">Cant.</th>
                            <th>Precio</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody id="listaVenta"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="col-md-4">

        <div class="card shadow-sm border-0 bg-primary text-white mb-3">
            <div class="card-body text-center py-4">
                <h6>Total a Pagar</h6>
                <h1 id="totalPagar">$0.00</h1>
            </div>
        </div>

        <div class="card shadow-sm border-0 p-3">

            <button class="btn btn-success w-100 mb-2" onclick="finalizarVenta()">
                COBRAR
            </button>

            <button class="btn btn-danger w-100" onclick="cancelarVenta()">
                CANCELAR
            </button>

            <hr>

            <div class="d-flex justify-content-between">
                <span>Artículos:</span>
                <span id="conteoArticulos">0</span>
            </div>

        </div>

        <div class="alert alert-secondary text-center mt-3">
            Cambio: <h4 id="cambioEntregado">$0.00</h4>
        </div>

    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let carrito = [];
let html5QrcodeScanner = null;

/* =========================
   📷 CÁMARA
========================= */
function toggleEscaner() {
    const contenedor = document.getElementById('contenedor-lector');

    if (contenedor.style.display === 'none') {
        contenedor.style.display = 'block';
        iniciarEscaner();
    } else {
        contenedor.style.display = 'none';
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear();
            html5QrcodeScanner = null;
        }
    }
}

function iniciarEscaner() {
    if (!html5QrcodeScanner) {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", {
            fps: 10,
            qrbox: 200
        });
    }

    html5QrcodeScanner.render((text) => {
        buscarYAgregar(text);
        vibrar();
    });
}

/* =========================
   🔍 BUSCAR
========================= */
function buscarYAgregar(codigo) {
    if (!codigo) return;

    fetch(`/buscar_producto/${codigo}`)
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                agregarAlCarrito(data.producto);
            }
        });
}

/* =========================
   ➕ CARRITO
========================= */
function agregarAlCarrito(p) {
    let ex = carrito.find(x => x.codigo_barras === p.codigo_barras);

    if (ex) ex.cantidad++;
    else carrito.push({
        codigo_barras: p.codigo_barras,
        nombre: p.nombre,
        precio: p.precio_venta,
        cantidad: 1
    });

    actualizarTabla();
}

/* =========================
   🔄 TABLA
========================= */
function actualizarTabla() {
    let lista = document.getElementById('listaVenta');
    lista.innerHTML = '';

    let total = 0;
    let items = 0;

    carrito.forEach((p, i) => {
        let sub = p.precio * p.cantidad;
        total += sub;
        items += p.cantidad;

        lista.innerHTML += `
        <tr>
            <td>${p.nombre}</td>
            <td class="text-center">${p.cantidad}</td>
            <td>$${p.precio}</td>
            <td>$${sub.toFixed(2)}</td>
            <td><button onclick="eliminar(${i})">X</button></td>
        </tr>`;
    });

    document.getElementById('totalPagar').innerText = `$${total.toFixed(2)}`;
    document.getElementById('conteoArticulos').innerText = items;
}

/* =========================
   ❌ ELIMINAR
========================= */
function eliminar(i) {
    carrito.splice(i, 1);
    actualizarTabla();
}

/* =========================
   💰 COBRAR
========================= */
function finalizarVenta() {
    if (carrito.length === 0) return;

    let pago = prompt("Pago:");
    let total = parseFloat(document.getElementById('totalPagar').innerText.replace('$',''));

    fetch('/finalizar_venta', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ carrito })
    }).then(r => r.json()).then(() => {
        document.getElementById('cambioEntregado').innerText =
            `$${(pago - total).toFixed(2)}`;

        carrito = [];
        actualizarTabla();
    });
}

/* =========================
   ❌ CANCELAR
========================= */
function cancelarVenta() {
    carrito = [];
    actualizarTabla();
    document.getElementById('cambioEntregado').innerText = "$0.00";
}

/* =========================
   ⌨️ FIX ANDROID TECLADO
========================= */
window.onload = function () {

    const input = document.getElementById('buscadorVentas');

    function procesar() {
        const codigo = input.value.trim();
        if (!codigo) return;

        buscarYAgregar(codigo);
        input.value = '';
    }

    // ENTER físico
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            procesar();
        }
    });

    // ANDROID "DONE / NEXT"
    input.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') procesar();
    });

    // fallback
    input.addEventListener('change', procesar);
};

function vibrar() {
    if (navigator.vibrate) navigator.vibrate(80);
}
</script>

{% endblock %}
